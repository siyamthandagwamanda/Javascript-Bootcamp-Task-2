<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Checker</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>

    <div class="container">
        <h1>STUDENT GRADE CHECKER</h1>

        <label for="nameInput">STUDENT N</label>
        <input type="text" id="nameInput" placeholder="Enter N">

        <label for="markInput">MARK</label>
        <input type="number" id="markInput" placeholder="ENTER M">

        <button id="checkButton">Checker</button>

        <div id="resultArea">
            <label for="resultArea">RESULT</label>
        </div>

        <ul id="studentList"></ul>
    </div>

    <script src="app.js"></script>
 </body>
</html>
